<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사동초 간식 투표 - 12메뉴</title>
    <!-- Firebase SDK (최소한의 기능만 포함) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; /* 스크롤 방지 */
            font-family: 'Malgun Gothic', sans-serif;
        }
        
        .main-wrapper { 
            display: flex; flex-direction: column; 
            width: 100%; height: 90vh; /* 여유 공간 확보 (PC/모바일 공용) */
            margin: 0 auto;
        }
        
        .title-bar { 
            height: 10%; background-color: #000; color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 3rem; font-weight: bold;
        }

        /* 🔴 12개를 보여주기 위해 3열 4행 그리드로 변경 */
        .container { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; /* 3열 */
            grid-template-rows: 1fr 1fr 1fr 1fr; /* 4행 */
            height: 90%; 
        }
        
        .option { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; border: 2px solid rgba(255,255,255,0.1); 
            position: relative; box-sizing: border-box;
            cursor: pointer;
        }
        
        /* 🎨 메뉴별 배경색 (단색으로 변경하여 파일 용량/네트워크 문제 해결) */
        .box1 { background-color: #E74C3C; } /* 흑임자핫도그 */
        .box2 { background-color: #F1C40F; } /* 인절미토스트 */
        .box3 { background-color: #27AE60; } /* 닭꼬치 */
        .box4 { background-color: #2980B9; } /* 떡볶이&김말이 */
        .box5 { background-color: #8E44AD; } /* 찹쌀꽈배기 */
        .box6 { background-color: #E67E22; } /* 수원왕갈비 */
        .box7 { background-color: #D35400; } /* 떡소꼬치 */
        .box8 { background-color: #F39C12; } /* 프렌치토스트 */
        .box9 { background-color: #C0392B; } /* 토마토떡피자 */
        .box10 { background-color: #2ECC71; } /* 회오리감자 */
        .box11 { background-color: #3498DB; } /* 베이컨떡말이 */
        .box12 { background-color: #1ABC9C; } /* 만두탕수 */

        /* 🔴 메뉴 이름 글자 크기 조정 (기존 7rem -> 5rem으로 축소) */
        h1 { 
            font-size: 5rem; /* 12개라 줄여야 함 */
            margin: 0; 
            font-weight: 900;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3); 
            pointer-events: none; /* 터치 이벤트가 h1에 걸리지 않게 */
        }
        
        /* 🔴 숫자 크기 조정 (기존 9rem -> 6rem으로 축소) */
        .count { 
            font-size: 6rem; 
            font-weight: bold; 
            margin-top: 10px; 
            background: rgba(255,255,255,0.2); 
            padding: 5px 40px; 
            border-radius: 50px; 
            pointer-events: none;
        }

        /* 🔴 수정 버튼 크기 및 위치 조정 */
        .undo-btn {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.3); border: 1px solid white; color: white; 
            padding: 5px 10px; font-size: 0.8rem; border-radius: 6px; cursor: pointer;
            z-index: 10;
        }

        /* 리셋 버튼 */
        .reset-all { position: fixed; top: 10px; right: 10px; opacity: 0.1; background: black; color: white; border: none; font-size: 12px; cursor: pointer; }

        /* 모바일 대응 (글자 크기만 살짝 더 조정) */
        @media (max-width: 600px) {
            .title-bar { font-size: 1.8rem; height: 12%; }
            .container { grid-template-columns: 1fr 1fr; /* 모바일에선 2열로 변경 */ grid-template-rows: repeat(6, 1fr); }
            h1 { font-size: 3rem; }
            .count { font-size: 4.5rem; padding: 5px 30px; }
            .undo-btn { padding: 4px 8px; font-size: 0.7rem; bottom: 5px; right: 5px; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="title-bar">사동초 간식 투표</div>
        <div class="container">
            <!-- 🔴 12개 메뉴 생성 및 onclick 함수에 ID 부여 -->
            <div class="option box1" onclick="vote('m1', 1)"><h1>흑임자핫도그</h1><div class="count" id="m1">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m1', -1)">수정</button></div>
            <div class="option box2" onclick="vote('m2', 1)"><h1>인절미토스트</h1><div class="count" id="m2">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m2', -1)">수정</button></div>
            <div class="option box3" onclick="vote('m3', 1)"><h1>닭꼬치</h1><div class="count" id="m3">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m3', -1)">수정</button></div>
            <div class="option box4" onclick="vote('m4', 1)"><h1>떡볶이&김말이</h1><div class="count" id="m4">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m4', -1)">수정</button></div>
            <div class="option box5" onclick="vote('m5', 1)"><h1>찹쌀꽈배기</h1><div class="count" id="m5">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m5', -1)">수정</button></div>
            <div class="option box6" onclick="vote('m6', 1)"><h1>수원왕갈비통닭</h1><div class="count" id="m6">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m6', -1)">수정</button></div>
            <div class="option box7" onclick="vote('m7', 1)"><h1>떡소꼬치</h1><div class="count" id="m7">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m7', -1)">수정</button></div>
            <div class="option box8" onclick="vote('m8', 1)"><h1>프렌치토스트</h1><div class="count" id="m8">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m8', -1)">수정</button></div>
            <div class="option box9" onclick="vote('m9', 1)"><h1>토마토떡피자</h1><div class="count" id="m9">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m9', -1)">수정</button></div>
            <div class="option box10" onclick="vote('m10', 1)"><h1>회오리감자</h1><div class="count" id="m10">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m10', -1)">수정</button></div>
            <div class="option box11" onclick="vote('m11', 1)"><h1>베이컨떡말이</h1><div class="count" id="m11">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m11', -1)">수정</button></div>
            <div class="option box12" onclick="vote('m12', 1)"><h1>만두탕수</h1><div class="count" id="m12">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m12', -1)">수정</button></div>
        </div>
    </div>
    <button class="reset-all" onclick="resetAll()">R</button>

    <script>
        // 🔴 부장님의 Firebase 설정으로 교체하세요! 
        const firebaseConfig = { databaseURL: "https://sadong-worth-vote-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // 🔴 12개 메뉴 ID에 맞게 Firebase 데이터 수신 설정
        db.ref('votes').on('value', (snapshot) => {
            const data = snapshot.val() || { m1:0, m2:0, m3:0, m4:0, m5:0, m6:0, m7:0, m8:0, m9:0, m10:0, m11:0, m12:0 };
            document.getElementById('m1').innerText = data.m1;
            document.getElementById('m2').innerText = data.m2;
            document.getElementById('m3').innerText = data.m3;
            document.getElementById('m4').innerText = data.m4;
            document.getElementById('m5').innerText = data.m5;
            document.getElementById('m6').innerText = data.m6;
            document.getElementById('m7').innerText = data.m7;
            document.getElementById('m8').innerText = data.m8;
            document.getElementById('m9').innerText = data.m9;
            document.getElementById('m10').innerText = data.m10;
            document.getElementById('m11').innerText = data.m11;
            document.getElementById('m12').innerText = data.m12;
        });
        
        // 🔴 투표 함수 (ID를 'm1', 'm2' 형태로 받음)
        function vote(menuId, val) {
            const ref = db.ref('votes/' + menuId);
            ref.transaction((current) => {
                const newValue = (current || 0) + val;
                return newValue < 0 ? 0 : newValue;
            });
        }
        
        // 🔴 초기화 함수 (12개 메뉴 모두 0으로 설정)
        function resetAll() { 
            if(confirm("데이터를 초기화하시겠습니까?")) { 
                db.ref('votes').set({ m1:0, m2:0, m3:0, m4:0, m5:0, m6:0, m7:0, m8:0, m9:0, m10:0, m11:0, m12:0 }); 
            } 
        }
    </script>
</body>
</html>
