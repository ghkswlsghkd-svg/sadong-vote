<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사동초 간식 투표 - 크기 최적화</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            font-family: 'Malgun Gothic', sans-serif;
        }
        
        .main-wrapper { 
            display: flex; flex-direction: column; 
            width: 100%; height: 100vh; /* 화면 전체 높이 사용 */
            margin: 0 auto;
        }
        
        .title-bar { 
            height: 8%; background-color: #000; color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 2.2rem; font-weight: bold;
        }

        .container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* 3열 */
            grid-template-rows: repeat(4, 1fr); /* 4행 */
            height: 92%; 
            padding: 5px;
            box-sizing: border-box;
            gap: 6px; /* 칸 사이 간격 살짝 부여 */
        }
        
        .option { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; border: 1px solid rgba(255,255,255,0.15); 
            position: relative; box-sizing: border-box;
            cursor: pointer;
            border-radius: 8px;
            padding: 10px;
        }
        
        /* 🎨 배경색 */
        .box1 { background-color: #E74C3C; }
        .box2 { background-color: #F1C40F; color: #000; } /* 인절미토스트는 어두운 글씨로 가독성 확보 */
        .box3 { background-color: #27AE60; }
        .box4 { background-color: #2980B9; }
        .box5 { background-color: #8E44AD; }
        .box6 { background-color: #E67E22; }
        .box7 { background-color: #D35400; }
        .box8 { background-color: #F39C12; }
        .box9 { background-color: #C0392B; }
        .box10 { background-color: #2ECC71; }
        .box11 { background-color: #3498DB; }
        .box12 { background-color: #1ABC9C; }

        /* 🔴 글자 크기 대폭 축소 (잘림 방지) */
        h1 { 
            font-size: 2.2rem; /* 기존 5rem -> 2.2rem으로 조절 */
            margin: 0; 
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4); 
            text-align: center;
            word-break: keep-all; /* 한글 단어 단위 줄바꿈 */
            pointer-events: none;
            line-height: 1.2;
        }
        
        /* 🔴 숫자 크기 및 패딩 조절 */
        .count { 
            font-size: 3rem; /* 기존 6rem -> 3rem으로 조절 */
            font-weight: bold; 
            margin-top: 8px; 
            background: rgba(0,0,0,0.3); 
            padding: 2px 25px; 
            border-radius: 30px; 
            pointer-events: none;
            color: #fff !important;
        }

        /* 수정 버튼 크기 축소 */
        .undo-btn {
            position: absolute; bottom: 5px; right: 5px;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.6); color: white; 
            padding: 2px 6px; font-size: 0.75rem; border-radius: 4px; cursor: pointer;
            z-index: 10;
        }

        .reset-all { position: fixed; top: 10px; right: 10px; opacity: 0.1; background: black; color: white; border: none; font-size: 12px; cursor: pointer; }

        /* 모바일/태블릿 대응 */
        @media (max-width: 768px) {
            .title-bar { font-size: 1.6rem; }
            .container { grid-template-columns: 1fr 1fr; grid-template-rows: repeat(6, 1fr); } /* 화면 작으면 2열 6행 */
            h1 { font-size: 1.6rem; }
            .count { font-size: 2.2rem; padding: 2px 20px; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="title-bar">사동초 간식 투표</div>
        <div class="container">
            <div class="option box1" onclick="vote('m1', 1)"><h1>흑임자핫도그</h1><div class="count" id="m1">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m1', -1)">수정</button></div>
            <div class="option box2" onclick="vote('m2', 1)"><h1>인절미토스트</h1><div class="count" id="m2">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m2', -1)">수정</button></div>
            <div class="option box3" onclick="vote('m3', 1)"><h1>닭꼬치구이</h1><div class="count" id="m3">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m3', -1)">수정</button></div>
            <div class="option box4" onclick="vote('m4', 1)"><h1>떡볶이&<br>김말이튀김</h1><div class="count" id="m4">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m4', -1)">수정</button></div>
            <div class="option box5" onclick="vote('m5', 1)"><h1>찹쌀꽈배기</h1><div class="count" id="m5">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m5', -1)">수정</button></div>
            <div class="option box6" onclick="vote('m6', 1)"><h1>수원왕갈비통닭</h1><div class="count" id="m6">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m6', -1)">수정</button></div>
            <div class="option box7" onclick="vote('m7', 1)"><h1>떡소꼬치</h1><div class="count" id="m7">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m7', -1)">수정</button></div>
            <div class="option box8" onclick="vote('m8', 1)"><h1>프렌치토스트</h1><div class="count" id="m8">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m8', -1)">수정</button></div>
            <div class="option box9" onclick="vote('m9', 1)"><h1>토마토소스<br>떡피자</h1><div class="count" id="m9">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m9', -1)">수정</button></div>
            <div class="option box10" onclick="vote('m10', 1)"><h1>회오리감자</h1><div class="count" id="m10">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m10', -1)">수정</button></div>
            <div class="option box11" onclick="vote('m11', 1)"><h1>베이컨떡말이</h1><div class="count" id="m11">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m11', -1)">수정</button></div>
            <div class="option box12" onclick="vote('m12', 1)"><h1>만두탕수</h1><div class="count" id="m12">0</div><button class="undo-btn" onclick="event.stopPropagation(); vote('m12', -1)">수정</button></div>
        </div>
    </div>
    <button class="reset-all" onclick="resetAll()">R</button>

    <script>
        // 부장님의 기존 Firebase 설정 URL 그대로 유지
        const firebaseConfig = { databaseURL: "https://sadong-worth-vote-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        db.ref('votes').on('value', (snapshot) => {
            const data = snapshot.val() || { m1:0, m2:0, m3:0, m4:0, m5:0, m6:0, m7:0, m8:0, m9:0, m10:0, m11:0, m12:0 };
            document.getElementById('m1').innerText = data.m1;
            document.getElementById('m2').innerText = data.m2;
            document.getElementById('m3').innerText = data.m3;
            document.getElementById('m4').innerText = data.m4;
            document.getElementById('m5').innerText = data.m5;
            document.getElementById('m6').innerText = data.m6;
            document.getElementById('m7').innerText = data.m7;
            document.getElementById('m8').innerText = data.m8;
            document.getElementById('m9').innerText = data.m9;
            document.getElementById('m10').innerText = data.m10;
            document.getElementById('m11').innerText = data.m11;
            document.getElementById('m12').innerText = data.m12;
        });
        
        function vote(menuId, val) {
            const ref = db.ref('votes/' + menuId);
            ref.transaction((current) => {
                const newValue = (current || 0) + val;
                return newValue < 0 ? 0 : newValue;
            });
        }
        
        function resetAll() { 
            if(confirm("데이터를 초기화하시겠습니까?")) { 
                db.ref('votes').set({ m1:0, m2:0, m3:0, m4:0, m5:0, m6:0, m7:0, m8:0, m9:0, m10:0, m11:0, m12:0 }); 
            } 
        }
    </script>
</body>
</html>
