<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사동초 학생 희망 간식 투표(부회장 공약)-1인 1표 - 최종 복구</title>
    <!-- 가장 안정적인 파이어베이스 라이브러리 로드 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; }
        .main-wrapper { display: flex; flex-direction: column; width: 100%; height: 100vh; box-sizing: border-box; }
        .title-bar { height: 8vh; background-color: #000; color: white; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; }
        .container { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); height: 92vh; padding: 5px; box-sizing: border-box; gap: 5px; }
        .option { display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; border: 1px solid rgba(255,255,255,0.15); position: relative; box-sizing: border-box; cursor: pointer; border-radius: 6px; padding: 5px; overflow: hidden; }
        
        .box1 { background-color: #E74C3C; } .box2 { background-color: #F1C40F; color: #000; } .box3 { background-color: #27AE60; } .box4 { background-color: #2980B9; } .box5 { background-color: #8E44AD; } .box6 { background-color: #E67E22; } .box7 { background-color: #D35400; } .box8 { background-color: #F39C12; } .box9 { background-color: #C0392B; } .box10 { background-color: #2ECC71; } .box11 { background-color: #3498DB; } .box12 { background-color: #1ABC9C; }
        
        h1 { font-size: 2.2rem; margin: 0; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.4); text-align: center; word-break: keep-all; pointer-events: none; line-height: 1.2; }
        .count { font-size: 2.8rem; font-weight: bold; margin-top: 4px; background: rgba(0,0,0,0.3); padding: 2px 25px; border-radius: 30px; pointer-events: none; color: #fff !important; }
        .undo-btn { position: absolute; bottom: 3px; right: 3px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.5); color: white; padding: 1px 5px; font-size: 0.7rem; border-radius: 4px; cursor: pointer; z-index: 10; }
        .reset-all { position: fixed; top: 10px; right: 10px; opacity: 0.1; background: black; color: white; border: none; font-size: 12px; cursor: pointer; }
        
        @media (max-width: 768px) { .title-bar { font-size: 1.6rem; height: 7vh; } .container { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(6, 1fr); height: 93vh; } h1 { font-size: 1.5rem; } .count { font-size: 2rem; padding: 1px 15px; } }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="title-bar">사동초 학생 희망 간식 투표(부회장 공약)-1인 1표</div>
        <div class="container">
            <div class="option box1" onclick="vote('f1')"><h1>흑임자핫도그</h1><div class="count" id="f1">0</div><button class="undo-btn" onclick="event.stopPropagation(); undo('f1')">수정</button></div>
            <div class="option box2" onclick="vote('f2')"><h1>인절미토스트</h1><div class="count" id="f2">0</div><button class="undo-btn" onclick="event.stopPropagation(); undo('f2')">수정</button></div>
            <div class="option box3" onclick="vote('f3')"><h1>닭꼬치구이</h1><div class="count" id="f3">0</div><button class="undo-btn" onclick="event.stopPropagation(); undo('f3')">수정</button></div>
            <div class="option box4" onclick="vote('f4')"><h1>떡볶이&<br>김말이튀김</h1><div class="count" id="f4">0</div><button class="undo-btn" onclick="event.stopPropagation(); undo('f4')">수정</button></div>
            <div class="option box5" onclick="vote('f5')"><h1>찹쌀꽈배기</h1><div class="count" id="f5">0</div><button class="undo-btn" onclick="event.stopPropagation(); undo('f5')">수정</button></div>
            <div class="option box6" onclick="vote('f6')"><h1>수원왕갈비통닭</h1><div class="count" id="f6">0</div><button class="undo-btn" onclick="event.stopPropagation(); undo('f6')">수정</button></div>
            <div class="option box7" onclick="vote('f7')"><h1>떡소꼬치</h1><div class="count" id="f7">0</div><button class="undo-btn" onclick="event.stopPropagation(); undo('f7')">수정</button></div>
            <div class="option box8" onclick="vote('f8')"><h1>프렌치토스트</h1><div class="count" id="f8">0</div><button class="undo-btn" onclick="event.stopPropagation(); undo('f8')">수정</button></div>
            <div class="option box9" onclick="vote('f9')"><h1>토마토소스<br>떡피자</h1><div class="count" id="f9">0</div><button class="undo-btn" onclick="event.stopPropagation(); undo('f9')">수정</button></div>
            <div class="option box10" onclick="vote('f10')"><h1>회오리감자</h1><div class="count" id="f10">0</div><button class="undo-btn" onclick="event.stopPropagation(); undo('f10')">수정</button></div>
            <div class="option box11" onclick="vote('f11')"><h1>베이컨떡말이</h1><div class="count" id="f11">0</div><button class="undo-btn" onclick="event.stopPropagation(); undo('f11')">수정</button></div>
            <div class="option box12" onclick="vote('f12')"><h1>만두탕수</h1><div class="count" id="f12">0</div><button class="undo-btn" onclick="event.stopPropagation(); undo('f12')">수정</button></div>
        </div>
    </div>
    <button class="reset-all" onclick="resetAll()">R</button>

    <script>
        // 부장님의 확실한 파이어베이스 주소 고정
        const firebaseConfig = { databaseURL: "https://sadong-worth-vote-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // 로컬 변수로 완벽하게 통제 (먹통 현상 원천 차단)
        let currentData = { f1:0, f2:0, f3:0, f4:0, f5:0, f6:0, f7:0, f8:0, f9:0, f10:0, f11:0, f12:0 };

        // 데이터 실시간 감시 및 동기화
        db.ref('lunchData').on('value', (snapshot) => {
            const val = snapshot.val();
            if (val) {
                currentData = val;
                for (let key in currentData) {
                    let el = document.getElementById(key);
                    if (el) el.innerText = currentData[key] || 0;
                }
            } else {
                // 파이어베이스가 완전히 비어있을 경우 초기 데이터 자동 생성
                db.ref('lunchData').set(currentData);
            }
        });
        
        // 투표 증가 함수 (가장 오류 없는 단순 set 방식)
        function vote(menuId) {
            let nextVal = (currentData[menuId] || 0) + 1;
            db.ref('lunchData/' + menuId).set(nextVal);
        }
        
        // 수정(감소) 함수
        function undo(menuId) {
            let nextVal = (currentData[menuId] || 0) - 1;
            if (nextVal < 0) nextVal = 0;
            db.ref('lunchData/' + menuId).set(nextVal);
        }
        
        function resetAll() { 
            if(confirm("급식 투표 데이터를 전부 초기화할까요?")) { 
                db.ref('lunchData').set({ f1:0, f2:0, f3:0, f4:0, f5:0, f6:0, f7:0, f8:0, f9:0, f10:0, f11:0, f12:0 }); 
            } 
        }
    </script>
</body>
</html>
