<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사동초 가치 투표 - 최종</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background-color: #000; 
            overflow: hidden; /* 스크롤 방지 */
        }
        
        /* 🔴 전체 높이를 90%만 써서 하단 바에 안 잘리게 여유를 둡니다. */
        .main-wrapper { 
            display: flex; flex-direction: column; 
            width: 100%; height: 90vh; 
        }
        
        .title-bar { 
            height: 10%; background-color: #000; color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 4vw; font-weight: bold; text-align: center;
        }

        /* 🔴 투표 영역 높이를 조절해서 아래쪽 공간을 비워둡니다. */
        .container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr; 
            height: 90%; 
        }
        
        .option { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; border: 1px solid rgba(255,255,255,0.2); 
            position: relative; box-sizing: border-box;
            background-size: cover; background-position: center;
        }
        
        .touch-area { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .box1 { background-image: url('box1.png.png'); background-color: #ff6b6b; } 
        .box2 { background-color: #4ECDC4; }
        .box3 { background-color: #45B7D1; } 
        .box4 { background-color: #F7D794; }

        h1 { font-size: 8vw; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .count { font-size: 10vw; font-weight: bold; margin-top: 5px; background: rgba(0,0,0,0.6); padding: 5px 30px; border-radius: 50px; }

        /* 🔴 수정 버튼을 더 위로 올려서 절대 안 잘리게 함 */
        .undo-btn {
            position: absolute; bottom: 20%; left: 10px;
            background: rgba(255,255,255,0.3); border: 1px solid white; color: white; 
            padding: 5px 10px; font-size: 0.8rem; border-radius: 6px;
        }

        .reset-all { position: fixed; top: 5px; right: 5px; opacity: 0.1; background: black; color: white; border: none; font-size: 10px; }

        @media (max-width: 600px) {
            .title-bar { font-size: 5vw; }
            h1 { font-size: 11vw; }
            .count { font-size: 12vw; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="title-bar">사동초 가치 투표</div>
        <div class="container">
            <div class="option box1"><div class="touch-area" onclick="vote(1, 1)"><h1>존중</h1><div class="count" id="c1">0</div></div><button class="undo-btn" onclick="vote(1, -1)">수정</button></div>
            <div class="option box2"><div class="touch-area" onclick="vote(2, 1)"><h1>배려</h1><div class="count" id="c2">0</div></div><button class="undo-btn" onclick="vote(2, -1)">수정</button></div>
            <div class="option box3"><div class="touch-area" onclick="vote(3, 1)"><h1>책임</h1><div class="count" id="c3">0</div></div><button class="undo-btn" onclick="vote(3, -1)">수정</button></div>
            <div class="option box4"><div class="touch-area" onclick="vote(4, 1)"><h1>협력</h1><div class="count" id="c4">0</div></div><button class="undo-btn" onclick="vote(4, -1)">수정</button></div>
        </div>
    </div>
    <button class="reset-all" onclick="resetAll()">R</button>

    <script>
        const firebaseConfig = { databaseURL: "https://sadong-worth-vote-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        db.ref('votes').on('value', (snapshot) => {
            const data = snapshot.val() || { c1:0, c2:0, c3:0, c4:0 };
            document.getElementById('c1').innerText = data.c1;
            document.getElementById('c2').innerText = data.c2;
            document.getElementById('c3').innerText = data.c3;
            document.getElementById('c4').innerText = data.c4;
        });
        function vote(num, val) {
            const ref = db.ref('votes/c' + num);
            ref.transaction((current) => {
                const newValue = (current || 0) + val;
                return newValue < 0 ? 0 : newValue;
            });
        }
        function resetAll() { if(confirm("초기화?")) { db.ref('votes').set({ c1:0, c2:0, c3:0, c4:0 }); } }
    </script>
</body>
</html>
