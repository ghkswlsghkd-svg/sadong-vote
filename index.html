<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>사동초 가치 투표 - 최종 완성</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        /* 기본 스타일 고정 */
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #000; 
            position: fixed; /* 화면 밀림 방지 */
        }
        
        /* 자바스크립트로 계산할 가상 높이 변수(--vh) 사용 */
        .main-wrapper { 
            display: flex; flex-direction: column; 
            width: 100%;
            height: calc(var(--vh, 1vh) * 100); 
        }
        
        .title-bar { 
            height: 8%; background-color: #000; color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 3.2vw; font-weight: bold; text-align: center;
            box-sizing: border-box;
        }

        .container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr; 
            height: 92%;
        }
        
        .option { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; border: 1px solid rgba(255,255,255,0.2); 
            position: relative; box-sizing: border-box;
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }
        
        .touch-area { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .box1 { background-image: url('box1.png.png'); background-color: #ff6b6b; } 
        .box2 { background-color: #4ECDC4; }
        .box3 { background-color: #45B7D1; } 
        .box4 { background-color: #F7D794; }

        h1 { font-size: 8vw; margin: 0; pointer-events: none; text-shadow: 4px 4px 10px rgba(0,0,0,0.8); }
        .count { font-size: 9vw; font-weight: bold; margin-top: 5px; background: rgba(0,0,0,0.6); padding: 5px 30px; border-radius: 50px; }

        .undo-btn {
            position: absolute; bottom: 15px; left: 15px;
            background: rgba(255,255,255,0.3); border: 1px solid white; color: white; 
            padding: 4px 10px; font-size: 0.8rem; border-radius: 6px;
        }

        .reset-all { position: fixed; bottom: 5px; right: 5px; opacity: 0.1; background: black; color: white; border: none; font-size: 10px; }

        @media (max-width: 600px) {
            .title-bar { font-size: 4.5vw; }
            h1 { font-size: 10vw; }
            .count { font-size: 11vw; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper" id="mainWrapper">
        <div class="title-bar">사동초 학생이 가장 잘 지켜야 할 가치를 뽑아주세요!</div>
        <div class="container">
            <div class="option box1"><div class="touch-area" onclick="vote(1, 1)"><h1>존중</h1><div class="count" id="c1">0</div></div><button class="undo-btn" onclick="vote(1, -1)">수정</button></div>
            <div class="option box2"><div class="touch-area" onclick="vote(2, 1)"><h1>배려</h1><div class="count" id="c2">0</div></div><button class="undo-btn" onclick="vote(2, -1)">수정</button></div>
            <div class="option box3"><div class="touch-area" onclick="vote(3, 1)"><h1>책임</h1><div class="count" id="c3">0</div></div><button class="undo-btn" onclick="vote(3, -1)">수정</button></div>
            <div class="option box4"><div class="touch-area" onclick="vote(4, 1)"><h1>협력</h1><div class="count" id="c4">0</div></div><button class="undo-btn" onclick="vote(4, -1)">수정</button></div>
        </div>
    </div>
    <button class="reset-all" onclick="resetAll()">Reset</button>

    <script>
        // [핵심] 모바일 브라우저의 실제 높이를 계산하는 함수
        function setScreenSize() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        setScreenSize();
        window.addEventListener('resize', setScreenSize);

        // 파이어베이스 설정
        const firebaseConfig = { databaseURL: "https://sadong-worth-vote-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('votes').on('value', (snapshot) => {
            const data = snapshot.val() || { c1:0, c2:0, c3:0, c4:0 };
            document.getElementById('c1').innerText = data.c1;
            document.getElementById('c2').innerText = data.c2;
            document.getElementById('c3').innerText = data.c3;
            document.getElementById('c4').innerText = data.c4;
        });

        function vote(num, val) {
            const ref = db.ref('votes/c' + num);
            ref.transaction((current) => {
                const newValue = (current || 0) + val;
                return newValue < 0 ? 0 : newValue;
            });
        }

        function resetAll() { if(confirm("초기화할까요?")) { db.ref('votes').set({ c1:0, c2:0, c3:0, c4:0 }); } }
    </script>
</body>
</html>
