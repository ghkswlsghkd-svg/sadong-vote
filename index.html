<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사동초 가치 투표 - 완성형</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        /* 1. 모바일 하단바를 고려한 동적 높이 설정 */
        body, html { 
            margin: 0; padding: 0; 
            height: 100dvh; /* 모바일 주소창 변화에 대응 */
            width: 100vw; 
            overflow: hidden; 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #000; 
        }
        
        .main-wrapper { 
            display: flex; flex-direction: column; 
            height: 100dvh; width: 100%; 
        }
        
        /* 2. 타이틀 바 높이 살짝 축소 (공간 확보) */
        .title-bar { 
            height: 8dvh; background-color: #000; color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 3.2vw; font-weight: bold; text-align: center;
            padding: 0 10px; box-sizing: border-box;
        }

        /* 3. 컨테이너가 남은 공간을 꽉 채우도록 설정 */
        .container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr; 
            height: 92dvh;
            flex-grow: 1;
        }
        
        .option { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; border: 1px solid rgba(255,255,255,0.2); 
            position: relative; box-sizing: border-box;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 0; /* 그리드 내부에서 잘림 방지 */
        }
        
        .touch-area { 
            width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; 
        }

        /* [핵심] 깃허브 파일명 box1.png.png 에 맞춤 */
        .box1 { background-image: url('box1.png.png'); background-color: #ff6b6b; } 
        .box2 { background-color: #4ECDC4; }
        .box3 { background-color: #45B7D1; } 
        .box4 { background-color: #F7D794; }

        h1 { 
            font-size: 7.5vw; 
            margin: 0; pointer-events: none; 
            text-shadow: 4px 4px 15px rgba(0,0,0,0.8); 
        }
        .count { 
            font-size: 8.5vw; font-weight: bold; margin-top: 5px; 
            pointer-events: none; 
            background: rgba(0,0,0,0.6); padding: 5px 30px; border-radius: 50px; 
        }

        /* [핵심] 수정 버튼이 하단바에 가려지지 않게 위치 조정 */
        .undo-btn {
            position: absolute; 
            bottom: 12%; /* 바닥에서 살짝 더 위로 올림 */
            left: 15px;
            background: rgba(255,255,255,0.3); 
            border: 1px solid rgba(255,255,255,0.6); 
            color: white; 
            padding: 4px 10px;
            font-size: 0.9rem; 
            border-radius: 6px; 
            z-index: 100;
        }

        /* 4. 리셋 버튼을 더 안쪽으로 배치 */
        .reset-all { 
            position: fixed; bottom: 5px; right: 5px; opacity: 0.2;
            background: black; color: white; border: none; padding: 3px; 
            font-size: 10px; z-index: 200;
        }

        @media (max-width: 600px) {
            .title-bar { font-size: 4.5vw; height: 10dvh; }
            .container { height: 90dvh; }
            h1 { font-size: 9vw; }
            .count { font-size: 10vw; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="title-bar">사동초 학생이 가장 잘 지켜야 할 가치를 뽑아주세요!</div>
        <div class="container">
            <div class="option box1">
                <div class="touch-area" onclick="vote(1, 1)"><h1>존중</h1><div class="count" id="c1">0</div></div>
                <button class="undo-btn" onclick="vote(1, -1)">수정</button>
            </div>
            <div class="option box2">
                <div class="touch-area" onclick="vote(2, 1)"><h1>배려</h1><div class="count" id="c2">0</div></div>
                <button class="undo-btn" onclick="vote(2, -1)">수정</button>
            </div>
            <div class="option box3">
                <div class="touch-area" onclick="vote(3, 1)"><h1>책임</h1><div class="count" id="c3">0</div></div>
                <button class="undo-btn" onclick="vote(3, -1)">수정</button>
            </div>
            <div class="option box4">
                <div class="touch-area" onclick="vote(4, 1)"><h1>협력</h1><div class="count" id="c4">0</div></div>
                <button class="undo-btn" onclick="vote(4, -1)">수정</button>
            </div>
        </div>
    </div>
    <button class="reset-all" onclick="resetAll()">ResetAll</button>

    <script>
        const firebaseConfig = { databaseURL: "https://sadong-worth-vote-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('votes').on('value', (snapshot) => {
            const data = snapshot.val() || { c1:0, c2:0, c3:0, c4:0 };
            document.getElementById('c1').innerText = data.c1;
            document.getElementById('c2').innerText = data.c2;
            document.getElementById('c3').innerText = data.c3;
            document.getElementById('c4').innerText = data.c4;
        });

        function vote(num, val) {
            const ref = db.ref('votes/c' + num);
            ref.transaction((current) => {
                const newValue = (current || 0) + val;
                return newValue < 0 ? 0 : newValue;
            });
        }

        function resetAll() {
            if(confirm("초기화할까요?")) {
                db.ref('votes').set({ c1:0, c2:0, c3:0, c4:0 });
            }
        }
    </script>
</body>
</html>
