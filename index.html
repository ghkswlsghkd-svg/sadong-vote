<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사동초 가치 투표 - 텍스트 강조형</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
        }
        
        .main-wrapper { 
            display: flex; flex-direction: column; 
            width: 100%; height: 90vh; /* 여유 공간 확보 */
            margin: 0 auto;
        }
        
        .title-bar { 
            height: 12%; background-color: #000; color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 3rem; font-weight: bold;
        }

        .container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr; 
            height: 88%; 
        }
        
        .option { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; border: 2px solid rgba(255,255,255,0.1); 
            position: relative; box-sizing: border-box;
        }
        
        /* 🎨 배경 이미지 삭제 및 단색 배경 설정 */
        .box1 { background-color: #E74C3C; } /* 존중 - 빨강 계열 */
        .box2 { background-color: #27AE60; } /* 배려 - 초록 계열 */
        .box3 { background-color: #2980B9; } /* 책임 - 파랑 계열 */
        .box4 { background-color: #F39C12; } /* 협력 - 노랑 계열 */

        /* 🔴 글자 및 숫자 크기 대폭 확대 */
        h1 { 
            font-size: 7rem; /* 기존 5rem -> 7rem */
            margin: 0; 
            font-weight: 900;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.3); 
        }
        .count { 
            font-size: 9rem; /* 기존 6rem -> 9rem */
            font-weight: bold; 
            margin-top: 10px; 
            background: rgba(255,255,255,0.2); 
            padding: 10px 60px; 
            border-radius: 100px; 
        }

        .undo-btn {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.3); border: 1px solid white; color: white; 
            padding: 8px 15px; font-size: 1.1rem; border-radius: 8px; cursor: pointer;
        }

        .reset-all { position: fixed; top: 10px; right: 10px; opacity: 0.1; background: black; color: white; border: none; font-size: 12px; cursor: pointer; }

        /* 모바일 대응 */
        @media (max-width: 600px) {
            .title-bar { font-size: 1.8rem; }
            h1 { font-size: 4.5rem; }
            .count { font-size: 6rem; padding: 5px 40px; }
            .undo-btn { padding: 5px 10px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="title-bar">사동초 학생들이 지켜야할 가치에 투표해주세요~</div>
        <div class="container">
            <div class="option box1"><div onclick="vote(1, 1)" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;"><h1>존중</h1><div class="count" id="c1">0</div></div><button class="undo-btn" onclick="vote(1, -1)">수정</button></div>
            <div class="option box2"><div onclick="vote(2, 1)" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;"><h1>배려</h1><div class="count" id="c2">0</div></div><button class="undo-btn" onclick="vote(2, -1)">수정</button></div>
            <div class="option box3"><div onclick="vote(3, 1)" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;"><h1>책임</h1><div class="count" id="c3">0</div></div><button class="undo-btn" onclick="vote(3, -1)">수정</button></div>
            <div class="option box4"><div onclick="vote(4, 1)" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;"><h1>협력</h1><div class="count" id="c4">0</div></div><button class="undo-btn" onclick="vote(4, -1)">수정</button></div>
        </div>
    </div>
    <button class="reset-all" onclick="resetAll()">R</button>

    <script>
        const firebaseConfig = { databaseURL: "https://sadong-worth-vote-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        db.ref('votes').on('value', (snapshot) => {
            const data = snapshot.val() || { c1:0, c2:0, c3:0, c4:0 };
            document.getElementById('c1').innerText = data.c1;
            document.getElementById('c2').innerText = data.c2;
            document.getElementById('c3').innerText = data.c3;
            document.getElementById('c4').innerText = data.c4;
        });
        function vote(num, val) {
            const ref = db.ref('votes/c' + num);
            ref.transaction((current) => {
                const newValue = (current || 0) + val;
                return newValue < 0 ? 0 : newValue;
            });
        }
        function resetAll() { if(confirm("데이터를 초기화하시겠습니까?")) { db.ref('votes').set({ c1:0, c2:0, c3:0, c4:0 }); } }
    </script>
</body>
</html>
