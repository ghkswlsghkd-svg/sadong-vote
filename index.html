<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사동초 가치 투표 - 최종</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        /* 1. 화면 밖으로 절대 안 나가게 설정 */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
        }
        
        /* 2. 전체 높이를 85%로 강제 고정 (PC 주소창/탭 높이 고려) */
        .main-wrapper { 
            display: flex; flex-direction: column; 
            width: 100%; height: 85vh; 
            margin: 0 auto;
        }
        
        .title-bar { 
            height: 12%; background-color: #000; color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 2.5rem; font-weight: bold;
        }

        /* 3. 투표 영역이 나머지 공간을 균등하게 나눠 가짐 */
        .container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr; 
            height: 88%; 
        }
        
        .option { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; border: 1px solid rgba(255,255,255,0.2); 
            position: relative; box-sizing: border-box;
            background-size: cover; background-position: center;
        }
        
        /* 🔴 깃허브 파일명 box1.png.png 유지 */
        .box1 { background-image: url('box1.png.png'); background-color: #ff6b6b; } 
        .box2 { background-color: #4ECDC4; }
        .box3 { background-color: #45B7D1; } 
        .box4 { background-color: #F7D794; }

        /* 4. 글자 크기가 칸을 넘지 않게 조절 */
        h1 { font-size: 5rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .count { font-size: 6rem; font-weight: bold; margin-top: 10px; background: rgba(0,0,0,0.6); padding: 5px 40px; border-radius: 50px; }

        /* 5. 수정 버튼 위치 고정 */
        .undo-btn {
            position: absolute; bottom: 15px; right: 15px;
            background: rgba(255,255,255,0.3); border: 1px solid white; color: white; 
            padding: 5px 12px; font-size: 0.9rem; border-radius: 6px; cursor: pointer;
        }

        .reset-all { position: fixed; top: 10px; right: 10px; opacity: 0.1; background: black; color: white; border: none; font-size: 12px; cursor: pointer; }

        /* 모바일 대응 (글자 크기만 살짝 조정) */
        @media (max-width: 600px) {
            .title-bar { font-size: 1.5rem; }
            h1 { font-size: 3.5rem; }
            .count { font-size: 4.5rem; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="title-bar">사동초 가치 투표</div>
        <div class="container">
            <div class="option box1"><div onclick="vote(1, 1)" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;"><h1>존중</h1><div class="count" id="c1">0</div></div><button class="undo-btn" onclick="vote(1, -1)">수정</button></div>
            <div class="option box2"><div onclick="vote(2, 1)" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;"><h1>배려</h1><div class="count" id="c2">0</div></div><button class="undo-btn" onclick="vote(2, -1)">수정</button></div>
            <div class="option box3"><div onclick="vote(3, 1)" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;"><h1>책임</h1><div class="count" id="c3">0</div></div><button class="undo-btn" onclick="vote(3, -1)">수정</button></div>
            <div class="option box4"><div onclick="vote(4, 1)" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;"><h1>협력</h1><div class="count" id="c4">0</div></div><button class="undo-btn" onclick="vote(4, -1)">수정</button></div>
        </div>
    </div>
    <button class="reset-all" onclick="resetAll()">R</button>

    <script>
        const firebaseConfig = { databaseURL: "https://sadong-worth-vote-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        db.ref('votes').on('value', (snapshot) => {
            const data = snapshot.val() || { c1:0, c2:0, c3:0, c4:0 };
            document.getElementById('c1').innerText = data.c1;
            document.getElementById('c2').innerText = data.c2;
            document.getElementById('c3').innerText = data.c3;
            document.getElementById('c4').innerText = data.c4;
        });
        function vote(num, val) {
            const ref = db.ref('votes/c' + num);
            ref.transaction((current) => {
                const newValue = (current || 0) + val;
                return newValue < 0 ? 0 : newValue;
            });
        }
        function resetAll() { if(confirm("초기화?")) { db.ref('votes').set({ c1:0, c2:0, c3:0, c4:0 }); } }
    </script>
</body>
</html>
